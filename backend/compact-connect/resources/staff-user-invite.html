<!doctype html>
<html>
  <body>
    <div
      style='background-color:#E9EFF9;color:#242424;font-family:"Helvetica Neue", "Arial Nova", "Nimbus Sans", Arial, sans-serif;font-size:16px;font-weight:400;letter-spacing:0.15008px;line-height:1.5;margin:0;padding:32px 0;min-height:100%;width:100%'
    >
      <table
        align="center"
        width="100%"
        style="margin:0 auto;max-width:600px;background-color:#FFFFFF"
        role="presentation"
        cellspacing="0"
        cellpadding="0"
        border="0"

        <tbody>
          <tr style="width:100%">
            <td>
              <div style="padding:40px 68px 8px 68px;text-align:center">
                <img
                  alt="logo"
                  src="https://compactconnect.org/wp-content/uploads/2024/07/Compact-Connect-logo_FINAL.png"
                  height="100"
                  style="height:100px;outline:none;border:none;text-decoration:none;vertical-align:middle;display:inline-block;max-width:100%"
                />
              </div>
              <div
                style='color:#09122B;font-size:16px;font-family:"Helvetica Neue", "Arial Nova", "Nimbus Sans", Arial, sans-serif;font-weight:normal;text-align:center;padding:44px 76px 44px 76px'

                <p>Welcome to CompactConnect!</p>

                </p>

              </div>
              <div
                style='color:#2459A9;font-size:14px;font-family:"Helvetica Neue", "Arial Nova", "Nimbus Sans", Arial, sans-serif;font-weight:normal;text-align:center;padding:0px 76px 68px 76px'

              </div>
              <div style="height:48px"></div>
              <div
                style='color:#ffffff;background-color:#2459A9;font-size:14px;font-family:"Helvetica Neue", "Arial Nova", "Nimbus Sans", Arial, sans-serif;font-weight:normal;text-align:center;padding:40px 68px 40px 68px'

                © 2024 CompactConnect
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
